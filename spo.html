<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <!-- 모바일 화면 대응 (확대/축소 방지) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>구매후기/사진첨부/동영상첨부 접근성 테스트</title>
  <style>
    /* ===== 문제의 핵심 CSS (vue-upload-component 라이브러리 원본 그대로) ===== */
    .file-uploads { overflow: hidden; position: relative; text-align: center; display: inline-block; }
    .file-uploads.file-uploads-html5 label { background: rgb(255,255,255); opacity: 0; font-size: 20em; z-index: 1; inset: 0px; position: absolute; width: 100%; height: 100%; }
    .file-uploads.file-uploads-html5 input { background: rgba(255,255,255,0); overflow: hidden; position: fixed; width: 1px; height: 1px; z-index: -1; opacity: 0; }

    /* ===== 사이트 원본 스타일 (레이아웃/외형) ===== */
    .p-review-write .container-review-write .row-box-textarea { position: relative; padding: 20px 16px 16px; background-color: rgb(255,255,255); }
    .p-review-write .container-review-write .row-box-textarea .wrap-makers-form-textarea { position: relative; padding-top: 9px; }
    .p-review-write .container-review-write .row-box-textarea .wrap-makers-form-textarea .makers-form-textarea { min-height: 130px; border: 1px solid rgb(225,225,225); word-break: keep-all; padding: 10px; }
    .p-review-write .container-review-write .row-box-textarea .text-count { position: absolute; top: -13px; right: 0px; font-size: 11px; line-height: 13px; }
    .p-review-write .container-review-write .row-img-upload { padding: 0px 16px; }
    .p-review-write .container-review-write .row-image-attach { position: relative; background-color: rgb(255,255,255); }
    .p-review-write .container-review-write .row-image-attach-col:first-child { margin-right: 3px; }
    .p-review-write .container-review-write .row-image-attach-col:last-child { margin-left: 3px; }
    .p-review-write .container-review-write .row-image-attach .file-uploads { display: block; width: 100%; }
    .p-review-write .container-review-write .row-image-attach-box { display: flex; align-items: center; justify-content: center; height: 48px; border: 1px solid rgb(193,193,193); }
    .p-review-write .container-review-write .row-image-attach-box-icon { width: 24px; height: 24px; }
    .p-review-write .container-review-write .row-image-attach-box-count,
    .p-review-write .container-review-write .row-image-attach-box-text { font-size: 14px; font-weight: 700; line-height: 16px; margin-left: 2px; margin-top: 2px; }

    /* ===== 테스트 페이지 보조(원본 아님): 정렬/플레이스홀더 표시용 ===== */
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif; background: #f5f5f5; }
    .container-review-write { max-width: 520px; margin: 0 auto; padding: 24px 0; }
    .title { display: block; font-size: 15px; margin: 0 16px 4px; }
    .text-gray-3 { color: #999; }
    .text-notes { font-size: 12px; font-weight: 400; }
    .col-12 { width: 100%; }
    .row-image-attach { display: flex; }
    .col { flex: 1; }
    .makers-form-textarea { width: 100%; box-sizing: border-box; }
    .c-placeholder { position: absolute; top: 19px; left: 10px; right: 10px; color: #b5b5b5; pointer-events: none; }
    .c-placeholder .txt-0 { font-weight: 700; color: #8f8f8f; font-size: 14px; }
    .c-placeholder-text .txt-1 { font-size: 12px; }
  </style>
</head>
<body>
<!-- CSS 스코프(.p-review-write .container-review-write) 때문에 상위 래퍼 2개 유지 -->
<div class="p-review-write">
  <section class="container container-review-write with-grid">

    <!-- ===== 구매후기 (사이트 원본 그대로) ===== -->
    <div class="row row-box-textarea">
      <div class="col-12">
        <strong class="title">구매후기 <span class="text text-gray-3 text-notes">(선택사항)</span></strong>
      </div>
      <div class="col-12">
        <div class="wrap-makers-form-textarea">
          <div class="c-placeholder">
            <div><span class="txt-0">이토록 소중한 한 문장</span></div>
            <div class="c-placeholder-text"><span class="txt-1">당신이 정성스레 남겨주신 구매후기, 모두 읽고 있습니다. 최대한 반영해 더 좋은 제품으로 보답할게요.</span></div>
          </div>
          <textarea wrap="soft" class="makers-form-textarea form-control" id="__BVID__34" style="resize: none; overflow-y: scroll; height: 130px;"></textarea>
          <p class="text text-count"><span class="text text-bold">0</span> <span class="text text-gray-3">/1000</span></p>
        </div>
      </div>
    </div>

    <!-- ===== 사진첨부 / 동영상첨부 (사이트 원본 그대로) ===== -->
    <div class="row-img-upload">
      <div class="row row-image-attach">
        <div class="col row-image-attach-col">
          <span class="file-uploads file-uploads-html5">
            <div role="button" class="row-image-attach-box">
              <i class="row-image-attach-box-icon row-image-attach-box-icon-image"></i>
              <span class="row-image-attach-box-text">사진 첨부</span>
              <span class="row-image-attach-box-count">0/3</span>
            </div>
            <label for="image"></label>
            <input type="file" name="file" id="image" accept="image/png, image/gif, image/jpeg, image/webp" multiple="multiple" aria-hidden="true" tabindex="-1">
          </span>
        </div>
        <div class="col row-image-attach-col">
          <div>
            <span class="file-uploads file-uploads-html5">
              <div role="button" class="row-image-attach-box">
                <i class="row-image-attach-box-icon row-image-attach-box-icon-video"></i>
                <span class="row-image-attach-box-text">동영상 첨부</span>
                <span class="row-image-attach-box-count">0/1</span>
              </div>
              <label for="video"></label>
              <input type="file" name="file" id="video" accept="video/mov, video/mp4, video/quicktime" multiple="multiple" aria-hidden="true" tabindex="-1">
            </span>
          </div>
        </div>
      </div>
      <div class="row-video-wrap"></div>
      <div class="row row-image-attach-list"></div>
    </div>

  </section>
</div>
</body>
</html>
