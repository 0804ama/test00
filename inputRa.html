<!DOCTYPE html>
<html lang="ko">
<head>
<meta http-equiv="content-Type" content="text/html; charset=utf-8">
<meta http-equiv="X-UA-Compatible" id="X-UA-Compatible" content="IE=edge,chrome=1">
<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0">
<title>인풋라디오 and 초점</title>
<style type="text/css">
.sr-only {
   clip-path: inset(50%);
    white-space: nowrap;
    border-width: 0;
    width: 1px;
    height: 1px;
    margin: -1px;
    padding: 0;
    position: absolute;
    overflow: hidden;   
}

label {
    position: relative;
    display: flex;
    align-items: center;
}

input[type="radio"].sr-only {
    width: 100%;        /* label 전체 너비 */
    height: 100%;       /* label 전체 높이 */
    top: 0;
    left: 0;
    margin: 0;
    opacity: 0;         /* 시각적으로 숨김 */
    clip-path: none;    /* 클리핑 제거 */
    overflow: visible;  /* 초점 링 허용 */
}
</style>
    
    
<script type="text/javascript"> 
document .getElementById("banner")
      .addEventListener("click", () => {});
</script>
</head>
    
<body>
  <h1>테스트 시작</h1>
  <p>  <img id="banner"  src="https://picsum.photos/300/100"  alt="배너" > </p>
   <hr>
  <ul>
   <li>
      <label>
         <input type="radio" class="sr-only" name="after" value="1">
         <img src="https://placehold.co/40x40" alt="">
         <span>레아 2650</span>
         <img src="https://placehold.co/40x40" alt="">
      </label>
   </li>
   <li>
      <label for="aatest">
         <input type="radio" id="aatest" class="sr-only" name="after" value="2" aria-label="아마라333">
         <img src="https://placehold.co/40x40" alt="">
         <span aria-hidden="true">아마라3333</span>
         <img src="https://placehold.co/40x40" alt="">
      </label>
   </li>
  </ul>
